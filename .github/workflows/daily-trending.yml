name: 📊 GitHub 每日热门项目总结

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 时间 0:00（北京时间 8:00）
  workflow_dispatch:  # 允许手动触发

jobs:
  trending-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: 爬取 GitHub 热门项目
        run: |
          python scripts/fetch_trending.py
      
      - name: 创建 Issue 发布总结
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('trending_summary.md', 'utf8');
            
            const today = new Date().toLocaleDateString('zh-CN');
            const issueTitle = `📊 GitHub 热门项目日报 - ${today}`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: summary,
              labels: ['daily-report', '🔥trending']
            });
